<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="轻松记">
  <title>轻松记</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <section id="auth-screen" class="auth-screen">
      <div class="auth-panel">
        <h1>轻松记</h1>
        <div class="auth-tabs">
          <button id="auth-login-tab" class="auth-tab active" type="button">登录</button>
          <button id="auth-register-tab" class="auth-tab" type="button">注册</button>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="auth-password" placeholder="至少 6 位" autocomplete="current-password">
        </div>
        <button id="auth-submit-btn" class="primary-btn" type="button">登录</button>
        <button id="auth-resend-btn" class="secondary-btn auth-resend-btn" type="button" hidden>重发验证邮件</button>
        <p id="auth-status" class="auth-status"></p>
      </div>
    </section>

    <div id="app-shell" hidden>
      <header id="header">
        <h1 class="header-title">轻松记</h1>
        <button id="settings-btn" class="icon-btn" aria-label="设置">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>

      <main id="main">

      <!-- Capture Tab -->
      <section id="tab-capture" class="tab-content active">
        <div class="capture-card">
          <textarea id="capture-input" placeholder="记录任何事..." autofocus></textarea>
          <button id="save-btn">保存</button>
        </div>
        <div class="recent-section">
          <p class="section-label">最近记录</p>
          <div id="recent-list"></div>
        </div>
      </section>

      <!-- Today Tab -->
      <section id="tab-today" class="tab-content">
        <!-- Summary area -->
        <div id="today-summary-idle" class="summary-top-card">
          <span id="today-entry-count" class="summary-count"></span>
          <button id="today-gen-btn" class="summary-gen-btn">生成总结 →</button>
        </div>
        <div id="today-summary-loading" class="summary-top-card loading-row" hidden>
          <div class="spinner-sm"></div>
          <span>正在归纳今天的内容...</span>
        </div>
        <div id="today-summary-result" hidden>
          <div id="today-summary-preview" class="summary-card"></div>
          <textarea id="today-summary-text" class="summary-card summary-textarea" hidden></textarea>
          <div class="summary-row">
            <button id="today-add-kanban-btn" class="kanban-cta-btn">📋 加入看板</button>
            <button id="today-edit-btn" class="ghost-btn">编辑</button>
            <button id="today-regen-btn" class="ghost-btn">重新生成</button>
          </div>
        </div>

        <!-- Entries -->
        <div class="today-header">
          <div id="today-date" class="today-date"></div>
        </div>
        <div id="today-entries"></div>
        <div id="today-empty" class="empty-state" hidden>
          <div class="empty-icon">📭</div>
          <p>今天还没有记录</p>
          <p class="empty-sub">去第一个标签记点什么吧</p>
        </div>
      </section>

      <!-- Kanban Tab -->
      <section id="tab-kanban" class="tab-content">
        <div class="kanban-filters" id="kanban-filters">
          <button class="k-filter-btn active" data-filter="todo">Todo</button>
          <button class="k-filter-btn" data-filter="reminder">提醒</button>
          <button class="k-filter-btn" data-filter="quote">好句</button>
          <button class="k-filter-btn" data-filter="thought">感触</button>
          <button class="k-filter-btn" data-filter="all">全部</button>
        </div>
        <div class="kanban-filters" id="kanban-date-filters">
          <button class="k-filter-btn active" data-date="all">全部时间</button>
          <button class="k-filter-btn" data-date="today">今天</button>
          <button class="k-filter-btn" data-date="week">本周</button>
        </div>
        <div id="kanban-list"></div>
        <button id="kanban-clear-done-btn" class="ghost-btn kanban-clear-btn" hidden>清除已完成</button>
        <div id="kanban-empty" class="empty-state" hidden>
          <div class="empty-icon">📋</div>
          <p>看板空空如也</p>
          <p class="empty-sub">从今日总结中加入事项</p>
        </div>
      </section>

      </main>

      <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="capture">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>记录</span>
      </button>
      <button class="nav-btn" data-tab="today">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>今日</span>
      </button>
      <button class="nav-btn" data-tab="kanban">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/>
        </svg>
        <span>看板</span>
      </button>
      </nav>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" hidden>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <h2>设置</h2>
          <button id="close-settings-btn" class="icon-btn close-btn">✕</button>
        </div>
        <div class="settings-body">
          <p class="settings-section-label">AI 接口</p>
          <div class="form-group">
            <label>DeepSeek API Key</label>
            <input type="password" id="setting-api-key" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label>API Base URL <span class="label-hint">（可改为代理地址）</span></label>
            <input type="url" id="setting-base-url" placeholder="https://api.deepseek.com">
          </div>

          <p class="settings-section-label">账号</p>
          <p id="account-email" class="account-email"></p>
          <p id="sync-status" class="sync-status">未配置同步</p>
          <button id="sign-out-btn" class="secondary-btn" type="button">退出账号</button>

          <button id="save-settings-btn" class="primary-btn" style="margin-top:8px">保存</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
